services:
  - type: web
    name: do-motoculture
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "npm run prisma:migrate:deploy && npm start"
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: do-motoculture-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_REGISTRATION_ENABLED
        value: false
      - key: TRUST_PROXY
        value: true
      - key: APP_URL
        fromService:
          type: web
          name: do-motoculture
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: do-motoculture
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: do-motoculture
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: do-motoculture-db
    plan: free
    region: frankfurt
    databaseName: do_motoculture
    user: do_motoculture
    postgresMajorVersion: "17"
    ipAllowList: []
